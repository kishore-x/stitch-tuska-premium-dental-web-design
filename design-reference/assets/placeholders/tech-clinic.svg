<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f1f8f7"/>
      <stop offset="100%" stop-color="#dcf0ee"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg6)"/>
  <circle cx="1000" cy="180" r="150" fill="#e1b055" opacity="0.10"/>
  <circle cx="160" cy="740" r="180" fill="#00696b" opacity="0.06"/>
  <!-- dental chair -->
  <g transform="translate(360,300)">
    <rect x="0" y="240" width="480" height="42" rx="18" fill="#00696b"/>
    <rect x="30" y="90" width="100" height="200" rx="26" fill="#65c7c9"/>
    <rect x="130" y="70" width="280" height="60" rx="20" fill="#65c7c9"/>
    <rect x="0" y="282" width="42" height="90" rx="10" fill="#286868"/>
    <rect x="438" y="282" width="42" height="90" rx="10" fill="#286868"/>
  </g>
  <!-- overhead exam light -->
  <g transform="translate(600,60)">
    <circle cx="0" cy="0" r="46" fill="#ffffff" stroke="#00696b" stroke-width="5"/>
    <circle cx="0" cy="0" r="26" fill="#e1b055" opacity="0.5"/>
    <line x1="0" y1="46" x2="0" y2="120" stroke="#00696b" stroke-width="7"/>
  </g>
  <!-- monitor / scanner -->
  <g transform="translate(880,340)">
    <rect x="0" y="0" width="200" height="140" rx="14" fill="#181c1c"/>
    <rect x="10" y="10" width="180" height="120" rx="8" fill="#65c7c9"/>
    <rect x="80" y="140" width="40" height="40" fill="#181c1c"/>
    <rect x="50" y="180" width="100" height="14" rx="6" fill="#181c1c"/>
  </g>
  <text x="600" y="820" text-anchor="middle" font-family="Inter, sans-serif" font-size="26" fill="#286868" opacity="0.6">Illustrative placeholder — replace with clinic technology photo</text>
</svg>
